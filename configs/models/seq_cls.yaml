model_name_or_path: Qwen/Qwen2-7B-Instruct
tokenizer_name_or_path: Qwen/Qwen2-7B-Instruct
cache_dir: null
trust_remote_code: false
num_labels: 2
load_in_4bit: false
load_in_8bit: false
device_map: null
padding_side: right
use_custom_binary_head: false
attn_implementation: null
head_trainable_patterns:
  - classifier
  - score
  - head
lora:
  enabled: false
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  target_modules: all-linear
  # 与分类头命名一致：Decoder-only 多为 score；BERT 系多为 classifier；不存在的名字可能导致 PEFT 报错，可删。
  modules_to_save:
    - score
    - classifier
